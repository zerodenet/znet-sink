name: Release

on:
  push:
    tags:
      - 'v[0-9]+.*'

permissions:
  contents: write

jobs:
  # ── Generate changelog from conventional commits ──
  changelog:
    runs-on: ubuntu-latest
    outputs:
      body: ${{ steps.generate.outputs.body }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes from conventional commits
        id: generate
        shell: bash
        run: |
          # Find the previous tag so we only include commits from this release
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            RANGE=""  # first release — include all commits
          else
            RANGE="${PREV_TAG}..HEAD"
          fi

          # Categorize conventional commits.  Supports the common types from
          # commitlint-config-conventional.  Breaking changes are detected via
          # both "BREAKING CHANGE" footer and the "!:" shorthand (feat!: …).
          categorize() {
            local type="$1" label="$2"
            local commits
            # Match type: msg, type(scope): msg, and type!: msg (breaking)
            commits=$(git log --format="  - %s" ${RANGE} --grep="^${type}[!:(]" 2>/dev/null || true)
            if [ -n "$commits" ]; then
              echo "### ${label}"
              echo "$commits" | sed -E "s/^  - ${type}[!(]?:? ?/  - /; s/\)?:? / /"
              echo ""
            fi
          }

          # Breaking changes: "BREAKING CHANGE" footer or "type!:" prefix
          BREAKING=$(git log --format="  - %s" ${RANGE} --grep="BREAKING CHANGE\|!: " 2>/dev/null || true)

          {
            echo "## $(echo "${{ github.ref_name }}" | sed 's/^v//')"
            echo ""

            if [ -n "$BREAKING" ]; then
              echo "### ⚠ Breaking Changes"
              echo "$BREAKING"
              echo ""
            fi

            categorize "feat"     "🚀 Features"
            categorize "fix"      "🐛 Bug Fixes"
            categorize "perf"     "⚡ Performance"
            categorize "refactor" "🔧 Refactoring"
            categorize "docs"     "📝 Documentation"
            categorize "style"    "💄 Style"
            categorize "test"     "✅ Tests"
            categorize "ci"       "🤖 CI / Build"
            categorize "chore"    "🏠 Chores"
            categorize "revert"   "⏪ Reverts"
            categorize "build"    "📦 Dependencies"
          } > /tmp/release-notes.md

          # Fallback: if nothing matched, include a simple summary
          if [ $(wc -l < /tmp/release-notes.md) -le 3 ]; then
            echo "Full changelog: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${{ github.ref_name }}" >> /tmp/release-notes.md
          fi

          cat /tmp/release-notes.md

          # Write the body as a job output (multiline)
          {
            echo 'body<<EOF'
            cat /tmp/release-notes.md
            echo EOF
          } >> "$GITHUB_OUTPUT"

  # ── Build across platforms ──
  build:
    needs: changelog
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows: x86_64 only, NSIS exe + MSI
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform-key: windows-x86_64
          # macOS: build both Intel + Apple Silicon on macos-latest (ARM)
          - os: macos-latest
            target: aarch64-apple-darwin
            platform-key: darwin-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            platform-key: darwin-x86_64
          # Linux: x86_64, deb + AppImage
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform-key: linux-x86_64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify updater signing key is configured
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is not set."
            echo "::error::Without it the updater cannot sign bundles, so no"
            echo "::error::latest.json is generated and the published manifest"
            echo "::error::becomes an invalid {\"platforms\":{}} that breaks"
            echo "::error::update checks for every installed client."
            echo "::error::"
            echo "::error::Generate a key pair and configure the secret:"
            echo "::error::  pnpm tauri signer generate -w ~/.tauri/znet-sink.key"
            echo "::error::Then add the private key to repo Settings > Secrets"
            echo "::error::> Actions as TAURI_SIGNING_PRIVATE_KEY."
            exit 1
          fi
        shell: bash

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri updater signing key — stored in GitHub Repository Secrets.
          # Generate via: pnpm tauri signer generate -w ~/.tauri/znet-sink.key
          # Then add the private key content to repo Settings > Secrets > TAURI_SIGNING_PRIVATE_KEY
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'v__VERSION__'
          releaseBody: ${{ needs.changelog.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

      # The Tauri bundler generates a platform-specific latest.json with
      # a real signature (signed by TAURI_SIGNING_PRIVATE_KEY).  Capture it
      # so the merge job can combine all platforms into a single manifest.
      - name: Find and prepare latest.json for merge
        shell: bash
        run: |
          LATEST_JSON=$(find src-tauri/target -name "latest.json" -not -path "*/node_modules/*" 2>/dev/null | head -1)
          if [ -z "$LATEST_JSON" ]; then
            echo "::warning::latest.json not found for ${{ matrix.platform-key }} — this platform will be missing from the update manifest"
            mkdir -p upload
            echo '{"platforms":{}}' > upload/latest.json
          else
            echo "Found latest.json at ${LATEST_JSON}"
            mkdir -p upload
            cp "${LATEST_JSON}" upload/latest.json
          fi

      - name: Upload latest.json as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: updater-json-${{ matrix.platform-key }}
          path: upload/latest.json

  # ── Merge per-platform latest.json into a single update manifest ──
  # Each build job produces a latest.json containing ONLY its own platform
  # entry (with a real signature).  This job merges them all together so
  # the Tauri updater plugin can verify the signature for any platform.
  merge-updater-manifest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download per-platform latest.json artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: updater-json-*
          path: artifacts

      - name: Merge manifests into one latest.json
        shell: bash
        run: |
          echo "Artifacts found:"
          find artifacts -name "latest.json" -exec echo "  {}" \;

          # Merge: use first file as the base (carries version, notes,
          # pub_date), then fold every file's platforms into one dict.
          # jq '*' merges objects — each platform's signature & url are preserved.
          #
          # Bind the slurped array to $all BEFORE rebinding context to $base.
          # After `| $base` the `.` no longer refers to the file list, so `.[]`
          # would iterate over $base's own values (the version string, etc.),
          # making `$item.platforms` null and crashing `{} * null`.
          jq -s '
            . as $all
            | (.[0] // {}) as $base
            | $base
            | .platforms = (reduce $all[] as $item ({}; . * ($item.platforms // {})))
          ' artifacts/updater-json-*/latest.json > latest.json

          # Guarantee the top-level fields the updater plugin requires
          # (version, pub_date) exist even when every platform fell back to
          # the empty placeholder — otherwise serde fails with
          # "missing field `version`" on the client.  The version comes
          # from the git tag (e.g. v0.0.6 → 0.0.6).
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg version "$VERSION" \
             --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
             --arg notes "" \
             '.version   = (.version   // $version)
              | .pub_date = (.pub_date // $pub_date)
              | .notes    = (.notes    // $notes)' \
             latest.json > latest.json.tmp && mv latest.json.tmp latest.json

          echo "=== Merged latest.json ==="
          cat latest.json

      - name: Upload merged latest.json to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: latest.json
