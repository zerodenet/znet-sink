name: Release

on:
  push:
    tags:
      - 'v[0-9]+.*'

permissions:
  contents: write

jobs:
  # ── Build across platforms ──
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows: x86_64 only, NSIS exe + MSI
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform-key: windows-x86_64
          # macOS: build both Intel + Apple Silicon on macos-latest (ARM)
          - os: macos-latest
            target: aarch64-apple-darwin
            platform-key: darwin-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            platform-key: darwin-x86_64
          # Linux: x86_64, deb + AppImage
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform-key: linux-x86_64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'v__VERSION__'
          releaseBody: 'See the release notes at https://github.com/zerodenet/znet-sink/releases/tag/${{ github.ref_name }}'
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

  # ── Generate and upload update manifest (latest.json) ──
  generate-update-manifest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Generate latest.json
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          REPO="zerodenet/znet-sink"
          RELEASE_NOTES_URL="https://github.com/${REPO}/releases/tag/${TAG}"

          # Tauri 2 updater looks for this file at the configured endpoint.
          # GitHub's /releases/latest/download/ redirects to the most recent
          # non-draft, non-prerelease release → every tag push gets its own
          # latest.json, and the "latest" pointer is automatic.
          #
          # Asset names below must match Tauri bundler output.
          # Verify on first release and adjust if needed.
          cat <<EOF > latest.json
          {
            "version": "${VERSION}",
            "notes": "See release notes: ${RELEASE_NOTES_URL}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "signature": "",
                "url": "https://github.com/${REPO}/releases/download/${TAG}/ZNet%20Sink_${VERSION}_x64-setup.exe"
              },
              "darwin-x86_64": {
                "signature": "",
                "url": "https://github.com/${REPO}/releases/download/${TAG}/ZNet%20Sink_${VERSION}_x64.dmg"
              },
              "darwin-aarch64": {
                "signature": "",
                "url": "https://github.com/${REPO}/releases/download/${TAG}/ZNet%20Sink_${VERSION}_aarch64.dmg"
              },
              "linux-x86_64": {
                "signature": "",
                "url": "https://github.com/${REPO}/releases/download/${TAG}/znet-sink_${VERSION}_amd64.deb"
              }
            }
          }
          EOF

          echo "Generated latest.json:"
          cat latest.json

      - name: Upload latest.json to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: latest.json
